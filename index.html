<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 My Finance Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <div class="app-title">💰 My Finance Dashboard</div>
        <div class="app-sub">Personal money tracker</div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" onclick="showTab('budget')">📊 Budget</button>
      <button class="tab" onclick="showTab('log')">📅 Monthly log</button>
      <button class="tab" onclick="showTab('emi')">🏦 EMI tracker</button>
      <button class="tab" onclick="showTab('sip')">📈 SIP portfolio</button>
    </div>

    <div id="tab-budget" class="tab-panel active"></div>
    <div id="tab-log"    class="tab-panel"></div>
    <div id="tab-emi"    class="tab-panel"></div>
    <div id="tab-sip"    class="tab-panel"></div>
  </div>

  <script type="module">
    import { db, signInWithGoogle, signOut, getUser } from './supabase.js';

    // Make available globally
    window.signInWithGoogle = signInWithGoogle;
    window.signOut = signOut;

    // Check login state on load
    db.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        window.currentUser = session.user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display  = 'block';
        document.getElementById('user-name').textContent = session.user.user_metadata.full_name || session.user.email;
        // load data from supabase
        await window.loadAllData();
      } else {
        window.currentUser = null;
        document.getElementById('auth-screen').style.display = 'block';
        document.getElementById('app-screen').style.display  = 'none';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script src="log.js"></script>
  <script src="emi.js"></script>
  <script src="sip.js"></script>
<body>
  <div class="app-shell">

    <!-- LOGIN SCREEN -->
    <div id="auth-screen">
      <div style="min-height:100vh; display:flex; align-items:center; justify-content:center">
        <div style="text-align:center; padding:2rem">
          <div style="font-size:3rem; margin-bottom:1rem">💰</div>
          <div style="font-size:24px; font-weight:700; margin-bottom:8px">My Finance Dashboard</div>
          <div style="font-size:14px; color:var(--muted); margin-bottom:2rem">Track your money. Build your future.</div>
          <button onclick="signInWithGoogle()" style="
            display:inline-flex; align-items:center; gap:10px;
            padding:12px 24px; font-size:15px; font-weight:600;
            background:#fff; color:#1a1a1a;
            border:none; border-radius:10px; cursor:pointer;">
            <img src="https://www.google.com/favicon.ico" width="18" height="18">
            Sign in with Google
          </button>
        </div>
      </div>
    </div>

    <!-- APP SCREEN (shown after login) -->
    <div id="app-screen" style="display:none">
      <header class="app-header">
        <div>
          <div class="app-title">💰 My Finance Dashboard</div>
          <div class="app-sub">Personal money tracker</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px">
          <span id="user-name" style="font-size:13px; color:var(--muted)"></span>
          <button onclick="signOut()" class="btn-small">Sign out</button>
        </div>
      </header>

      <div class="tabs">
        <button class="tab active" onclick="showTab('budget')">📊 Budget</button>
        <button class="tab" onclick="showTab('log')">📅 Monthly log</button>
        <button class="tab" onclick="showTab('emi')">🏦 EMI tracker</button>
        <button class="tab" onclick="showTab('sip')">📈 SIP portfolio</button>
      </div>

      <div id="tab-budget" class="tab-panel active"></div>
      <div id="tab-log"    class="tab-panel"></div>
      <div id="tab-emi"    class="tab-panel"></div>
      <div id="tab-sip"    class="tab-panel"></div>
    </div>

  </div>
</body>
</html>
